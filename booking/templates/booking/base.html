<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}FitBook{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --surface2: #1c1c1c;
      --border:   #252525;
      --border2:  #333;
      --text:     #ede9e3;
      --muted:    #666;
      --muted2:   #999;
      --accent:   #e8ff47;       /* electric lime — our signature colour */
      --accent-fg:#0a0a0a;
      --accent-glow: rgba(232,255,71,0.18);
      --danger:   #ff4f4f;
      --radius:   2px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* ---- NAV ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.75rem 3rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 0.12em;
      color: var(--accent);
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav-link {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted2);
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--text); }

    /* ---- BUTTONS ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.18s;
      padding: 0.9rem 2rem;
      border-radius: var(--radius);
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--accent-glow);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost {
      background: transparent;
      color: var(--muted2);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ---- FOOTER ---- */
    .footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .footer-stripe {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    @media (max-width: 640px) {
      .nav { padding: 1.25rem 1.25rem; }
      .footer { padding: 1.25rem; flex-direction: column; gap: 0.5rem; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="nav">
  <a href="{% url 'landing' %}" class="nav-logo">FitBook</a>
  <div class="nav-right">
    <a class="nav-link" href="{% url 'book' %}">Book a Session</a>
    <a class="nav-link" href="/admin/">Admin</a>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="footer">
  <span>© 2026 FitBook — Leeds</span>
  <span class="footer-stripe">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="var(--muted)"/></svg>
    Payments secured by Stripe
  </span>
</footer>

</body>
</html>
